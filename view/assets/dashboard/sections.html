<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review Sections</title>
  <style>
    :root{--ink:#1d241f;--muted:#69756d;--line:#dacdb8;--green:#1f6b55;--shadow:0 18px 46px rgba(55,43,24,.14)}
    *{box-sizing:border-box} body{margin:0;color:var(--ink);background:linear-gradient(135deg,#f1e7d3,#fbf7ec 48%,#eadcc4);font-family:Georgia,"Times New Roman",serif;height:100vh;overflow:hidden}
    button,select{font:inherit}.nav{height:58px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,250,240,.94);border-bottom:1px solid var(--line)}
    .nav-title{font-weight:700;font-size:18px}.nav-center{flex:1;text-align:center}.project-select{min-width:280px;max-width:520px;border:1px solid var(--line);background:#fffdf7;border-radius:999px;padding:8px 12px}.nav-right{display:flex;gap:7px;flex-wrap:wrap}.nav a{text-decoration:none;color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:#fffdf7;font-size:14px}.nav a.active{background:var(--green);border-color:var(--green);color:white}
    .app{height:calc(100vh - 58px);display:grid;grid-template-columns:310px minmax(540px,1fr) 410px;gap:14px;padding:14px}.panel{background:rgba(255,250,240,.94);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;min-height:0;display:flex;flex-direction:column}.head,.tabs{padding:14px;border-bottom:1px solid var(--line)}h1,h2,h3{margin:0;letter-spacing:-.02em}h1{font-size:22px}h2{font-size:18px}.sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.35}
    .list,.main,.side{overflow:auto;min-height:0}.list{padding:9px}.card{width:100%;text-align:left;border:1px solid transparent;background:#fffdf7;border-radius:12px;padding:10px;margin-bottom:8px;cursor:pointer;color:var(--ink)}.card:hover,.card.active{border-color:var(--green);background:#f2faf0}.title{font-weight:700;font-size:14px}.meta{color:var(--muted);font-size:12px;margin-top:5px;line-height:1.35}.pill{display:inline-block;font-size:11px;padding:3px 7px;border-radius:999px;background:#e4efe4;color:#285a37;margin:5px 4px 0 0}.warn{background:#f6dfd3;color:#873e1e}
    .main{background:#fffdf7;padding:24px 30px;line-height:1.6;font-size:16px}.main img{max-width:100%;border:1px solid var(--line);border-radius:10px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid var(--line);border-radius:999px;background:#fffdf7;padding:7px 10px;cursor:pointer}.tab.active{background:var(--green);color:white;border-color:var(--green)}.side{padding:14px}.field{margin-bottom:14px}.label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}.value{line-height:1.45;white-space:pre-wrap}pre{white-space:pre-wrap;margin:0;font-family:Consolas,monospace;font-size:12px}
  </style>
  <link rel="stylesheet" href="/assets/dashboard/review-ui.css">
</head>
<body>
  <nav class="nav"><div class="nav-title">Review Writer</div><div class="nav-center"><select id="projectSelect" class="project-select"></select></div><div class="nav-right"><a href="/library">Library</a><a href="/discovery">Discovery</a><a href="/matrix">Matrix</a><a href="/blueprint">Blueprint</a><a class="active" href="/sections">Sections</a><a href="/figures">Figures</a><a href="/draft">Draft</a><a href="/final">Final</a></div></nav>
  <main class="app">
    <section class="panel"><div class="head"><h1>Section Drafts</h1><div id="projectInfo" class="sub">Loading...</div></div><div id="sectionList" class="list"></div></section>
    <section class="panel"><div class="head"><h2 id="mainTitle">Section Preview</h2><div id="mainMeta" class="sub"></div></div><div class="tabs"><button class="tab active" data-tab="section">Section</button><button class="tab" data-tab="drafts">All Drafts</button><button class="tab" data-tab="tasks">Tasks JSON</button><button class="tab" data-tab="report">Report</button></div><div id="main" class="main"></div></section>
    <section class="panel"><div class="head"><h2>Review Gate</h2><div class="sub">Check section prose and whether each important paragraph has a figure candidate.</div></div><div id="summary" class="side"></div></section>
  </main>
  <script src="/assets/dashboard/review-ui.js"></script>
  <script>
    let projects=[],selectedProject='',payload=null,selected='',tab='section';
    const $=id=>document.getElementById(id), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    const files=()=>payload?.section_files||[]; const candidates=()=>Array.isArray(payload?.figure_candidates)?payload.figure_candidates:(payload?.figure_candidates?.figures||payload?.figure_candidates?.candidates||[]);
    function fileUrl(path){return path?`/file?path=${encodeURIComponent(path)}`:''}
    function imageSrc(p,base=''){return fileUrl(p.startsWith('/')?p:[base,p].filter(Boolean).join('/'))}
    function inlineMd(text,base=''){let out='',last=0,re=/!\[([^\]]*)\]\(([^)]+)\)/g,m;while((m=re.exec(text))){out+=esc(text.slice(last,m.index));out+=`<img alt="${esc(m[1])}" src="${imageSrc(m[2],base)}">`;last=re.lastIndex}return(out+esc(text.slice(last))).replace(/\n/g,'<br>')}
    function md(s,base=''){return String(s||'').split(/\n{2,}/).map(b=>{b=b.trim();if(!b)return'';let m=b.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);if(m)return`<p><img alt="${esc(m[1])}" src="${imageSrc(m[2],base)}"></p>`;m=b.match(/^###\s+(.+)/);if(m)return`<h3>${esc(m[1])}</h3>`;m=b.match(/^##\s+(.+)/);if(m)return`<h2>${esc(m[1])}</h2>`;m=b.match(/^#\s+(.+)/);if(m)return`<h1>${esc(m[1])}</h1>`;return`<p>${inlineMd(b,base)}</p>`}).join('')}
    async function loadProjects(){projects=await(await fetch('/api/projects')).json();$('projectSelect').innerHTML=projects.map(p=>`<option value="${esc(p.project_id)}">${esc(p.project_id)}</option>`).join('');if(projects[0])loadProject(projects[0].project_id)}
    async function loadProject(id){selectedProject=id;payload=await(await fetch(`/api/project/${encodeURIComponent(id)}/sections`)).json();selected=(files()[0]||{}).name||'';render()}
    function renderList(){const fs=files();$('sectionList').innerHTML=fs.map(f=>`<button class="card ${f.name===selected?'active':''}" data-id="${esc(f.name)}"><div class="title">${esc(f.name)}</div><div class="meta">${esc(f.path)}</div><span class="pill">${esc((f.content||'').split(/\\s+/).filter(Boolean).length)} words</span></button>`).join('')||'<div class="empty">No section files found. Run the section drafting skill or inspect the All Drafts tab.</div>'}
    function renderMain(){const f=files().find(x=>x.name===selected)||{};$('mainTitle').textContent=tab==='section'?(f.name||'Section Preview'):tab;$('mainMeta').textContent=f.path||'';if(tab==='section')$('main').innerHTML=md(f.content,payload?.paths?.sections_dir||'');else if(tab==='drafts')$('main').innerHTML=md(payload?.section_drafts_md,payload?.paths?.stage_dir||'');else if(tab==='tasks')$('main').innerHTML=`<pre>${esc(JSON.stringify(payload?.section_tasks||{},null,2))}</pre>`;else $('main').innerHTML=md(payload?.section_drafting_report_md)}
    function renderSummary(){const fs=files();const figs=candidates();const unresolved=figs.filter(x=>String(x.resolution_status||'').includes('need')).length;const noFigure=figs.filter(x=>String(x.resolution_status||x.no_useful_figure_reason||'').includes('no_useful')).length;const status=fs.length&&figs.length?'Ready for figure check':'Needs section/figure check';$('projectInfo').textContent=`${selectedProject} · ${payload?.topic||''}`;$('summary').innerHTML=`<div class="field"><div class="label">Status</div><div class="value">${status}</div></div><div class="field"><div class="label">Section Files</div><div class="value">${fs.length}</div></div><div class="field"><div class="label">Figure Candidates</div><div class="value">${figs.length}</div></div><div class="field"><div class="label">Unresolved Source Images</div><div class="value">${unresolved}</div></div><div class="field"><div class="label">No Useful Figure Notes</div><div class="value">${noFigure}</div></div><div class="field"><div class="label">Human Check</div><div class="value">1. 每节是否是完整综述段落，不是提纲。\\n2. 每段是否围绕一篇文献工作展开。\\n3. 图候选是否真实对应段落内容。\\n4. unresolved 图片需回原文定位。</div></div>`}
    function render(){renderList();renderMain();renderSummary()}
    $('projectSelect').addEventListener('change',e=>loadProject(e.target.value));$('sectionList').addEventListener('click',e=>{const b=e.target.closest('[data-id]');if(!b)return;selected=b.dataset.id;tab='section';document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));render()});document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{tab=t.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));renderMain()}));loadProjects();
  </script>
</body>
</html>
